apiVersion: apps/v1
kind: Deployment
metadata:
  name: mmm-search
  labels:
    app: mmm-search
    env: stage
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: mmm-search
        env: stage
    spec:
      containers:
      - name: mmm-search
        resources:
          requests:
            cpu: 250m
            memory: 384Mi
